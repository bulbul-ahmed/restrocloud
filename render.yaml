# RestroCloud — Render Deployment Blueprint
# Deploy everything via: Render Dashboard → New → Blueprint → connect this repo
#
# Service URLs (based on names below — update names if already taken on Render):
#   API:        https://restrocloud-api.onrender.com
#   Dashboard:  https://restrocloud-dashboard.onrender.com
#   Superadmin: https://restrocloud-superadmin.onrender.com
#   Ordering:   https://restrocloud-ordering.onrender.com
#
# After first deploy, set these manually in Dashboard → restrocloud-api → Environment:
#   JWT_SECRET  →  run: openssl rand -base64 64

databases:
  - name: restrocloud-db
    databaseName: restrocloud
    user: restrocloud
    plan: free
    region: oregon

services:
  # ─── Redis ────────────────────────────────────────────────────────────────
  - type: redis
    name: restrocloud-redis
    plan: free
    region: oregon
    ipAllowList: []

  # ─── Backend API (NestJS) ─────────────────────────────────────────────────
  - type: web
    name: restrocloud-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push && node dist/main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: restrocloud-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: restrocloud-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ALLOWED_ORIGINS
        value: https://restrocloud-dashboard.onrender.com,https://restrocloud-superadmin.onrender.com,https://restrocloud-ordering.onrender.com

  # ─── Frontend Dashboard (React + Vite — Static Site) ─────────────────────
  - type: web
    name: restrocloud-dashboard
    runtime: static
    region: oregon
    rootDir: frontend-dashboard
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://restrocloud-api.onrender.com/api

  # ─── Frontend Superadmin (React + Vite — Static Site) ────────────────────
  - type: web
    name: restrocloud-superadmin
    runtime: static
    region: oregon
    rootDir: frontend-superadmin
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://restrocloud-api.onrender.com/api

  # ─── Frontend Ordering (Next.js — Web Service) ───────────────────────────
  - type: web
    name: restrocloud-ordering
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend-ordering
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://restrocloud-api.onrender.com/api
