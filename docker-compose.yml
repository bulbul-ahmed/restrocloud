version: '3.9'

# RestroCloud — Docker Compose (M0.4.1)
# Provides PostgreSQL + Redis for local dev.
# The NestJS backend runs directly with: npm run start:dev
# (No need to containerize the backend if you use Herd/Node locally)

services:
  postgres:
    image: postgres:16-alpine
    container_name: restrocloud_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: restrocloud
      POSTGRES_PASSWORD: restrocloud
      POSTGRES_DB: restrocloud_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U restrocloud -d restrocloud_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: restrocloud_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Full-stack containerized backend (for CI / staging)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restrocloud_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://restrocloud:restrocloud@postgres:5432/restrocloud_dev?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full  # only start with: docker-compose --profile full up

volumes:
  postgres_data:
  redis_data:
